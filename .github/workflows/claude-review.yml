name: Claude PR Review

# PR 리뷰 자동화 + @claude 멘션 응답
# - pull_request: 학습 디렉터리 변경이 있으면 자동 리뷰
# - issue_comment / pull_request_review_comment: "@claude" 멘션에 응답
#
# 인증: Max 구독 OAuth 토큰(CLAUDE_CODE_OAUTH_TOKEN)을 사용한다.
#   1) Claude Code에서 `claude setup-token` 실행 (또는 `/install-github-app`)
#   2) 나온 토큰을 repo Settings > Secrets and variables > Actions 에
#      `CLAUDE_CODE_OAUTH_TOKEN` 이름으로 등록
# 사용량은 Max 한도를 차감하므로 paths 필터로 트리거를 좁혀 둔다.

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "레디스/**"
      - "코딩테스트/**"
      - "독후감/**"
      - "docs/**"
      - "scripts/**"
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# 같은 PR에 푸시가 연속되면 이전 실행을 취소해 한도 낭비를 줄인다.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # prompt 가 설정되면 자동 모드(즉시 리뷰), 비어 있으면 @claude 멘션 대기 모드.
          # pull_request 이벤트일 때만 리뷰 프롬프트를 주고, 코멘트 이벤트는 멘션 모드로 둔다.
          prompt: |
            ${{ github.event_name == 'pull_request' && format('REPO: {0}\nPR NUMBER: {1}\n\n이 PR을 리뷰한다. 저장소 규칙은 AGENTS.md(루트 및 변경된 디렉터리)를 따른다.\n\n리뷰 원칙:\n- 리뷰 코멘트와 요약은 한국어로 작성한다.\n- 코드, API 이름, 파일명, 명령어, 에러 메시지는 영어 원문을 유지한다.\n- 단순 스타일 선호보다 버그, 회귀 위험, 테스트 누락, 동시성/TTL/장애 등 운영상 위험을 우선해서 지적한다.\n- 각 지적은 문제가 되는 이유, 영향 범위, 권장 수정 방향을 함께 설명한다.\n- 레디스 변경은 자료구조 선택 이유와 운영 관점 고려사항이 PR/코드에 드러나는지 확인한다.\n\n구체적인 이슈는 인라인 코멘트로, 전체 평가는 요약 코멘트로 남긴다.', github.repository, github.event.pull_request.number) || '' }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*)"
