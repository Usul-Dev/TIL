name: Coding Test CI

on:
  pull_request:
    paths:
      - "코딩테스트/**"
      - ".github/workflows/coding-test.yml"
  push:
    branches:
      - main
    paths:
      - "코딩테스트/**"
      - ".github/workflows/coding-test.yml"

permissions:
  contents: read

jobs:
  lint-format:
    name: Lint and format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 코딩테스트

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "코딩테스트/uv.lock"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .
