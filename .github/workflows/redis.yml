name: Redis CI

on:
  pull_request:
    paths:
      - "레디스/**"
      - ".github/workflows/redis.yml"
  push:
    branches:
      - main
    paths:
      - "레디스/**"
      - ".github/workflows/redis.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint and format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: 레디스

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "레디스/uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Ruff lint
        run: uv run --locked ruff check --output-format=github .

      - name: Ruff format check
        run: uv run --locked ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"

    defaults:
      run:
        working-directory: 레디스

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "레디스/uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Check Docker
        run: docker info

      - name: Run tests
        run: uv run --locked pytest -q
